<!DOCTYPE html>
<html>
<head>
    <title>Snake 🐍</title>
    <style>
        body {
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <canvas id="juego" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById("juego");
        const ctx = canvas.getContext("2d");
        const CELDA = 40;
        const ANCHO = 600;
        const ALTO = 600;

        let serpiente, direccion, comida, puntaje, intervalo;

        function iniciar() {
            serpiente = [{x:280, y: 280}, {x: 240, y: 280}, {x: 200, y: 280}];
            direccion = {x: CELDA, y: 0};
            comida = nuevaComida();
            puntaje = 0;
            clearInterval(intervalo);
            intervalo = setInterval(tick, 150);
        }

        function nuevaComida() {
            return {
                x: Math.floor(Math.random() * Math.floor(ANCHO/ CELDA)) * CELDA,
                y: Math.floor(Math.random() * Math.floor( ALTO/ CELDA)) * CELDA
            };
        }

        function tick() {
            const cabeza = {x: serpiente[0].x + direccion.x, y: serpiente[0].y + direccion.y};

            // Choque con paredes
            if (cabeza.x < 0 || cabeza.x >= ANCHO || cabeza.y < 0 || cabeza.y >= ALTO) {
                gameOver();
                return;
            }

            // Choque consigo misma
            if (serpiente.some(s => s.x === cabeza.x && s.y === cabeza.y)) {
                gameOver();
                return;
            }

            serpiente.unshift(cabeza);

            console.log(cabeza, comida);
            // Come la comida
            
            if (Math.abs(cabeza.x - comida.x) < CELDA && cabeza.y === comida.y) {
                puntaje++;
                comida = nuevaComida();
            } else {
                serpiente.pop();
            }

            dibujar();
        }

        function dibujar() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, ANCHO, ALTO);

            // Serpiente
            ctx.fillStyle = "#00C864";
            serpiente.forEach(s => ctx.fillRect(s.x + 1, s.y + 1, CELDA - 2, CELDA - 2));

            // Comida
            ctx.fillStyle = "#C83200";
            ctx.fillRect(comida.x + 1, comida.y + 1, CELDA - 2, CELDA - 2);

            // Puntaje
            ctx.fillStyle = "white";
            ctx.font = "24px Arial";
            ctx.fillText("Puntaje: " + puntaje, 10, 30);
        }

        function gameOver() {
            clearInterval(intervalo);
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(0, 0, ANCHO, ALTO);
            ctx.fillStyle = "white";
            ctx.font = "36px Arial";
            ctx.fillText("GAME OVER", ANCHO/2 - 100, ALTO/2 - 20);
            ctx.font = "20px Arial";
            ctx.fillText("Puntaje: " + puntaje, ANCHO/2 - 50, ALTO/2 + 20);
            ctx.fillText("Presioná R para reiniciar", ANCHO/2 - 120, ALTO/2 + 55);
        }

        document.addEventListener("keydown", e => {
            if (e.key === "ArrowRight" && direccion.x !== -CELDA) direccion = {x: CELDA, y: 0};
            if (e.key === "ArrowLeft" && direccion.x !== CELDA) direccion = {x: -CELDA, y: 0};
            if (e.key === "ArrowUp" && direccion.y !== CELDA) direccion = {x: 0, y: -CELDA};
            if (e.key === "ArrowDown" && direccion.y !== -CELDA) direccion = {x: 0, y: CELDA};
            if (e.key === "r" || e.key === "R") iniciar();
        });

        iniciar();
    </script>
</body>
</html>
